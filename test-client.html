<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent WebSocket Test Client</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
        max-width: 900px;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }
      input,
      button,
      textarea {
        font: inherit;
      }
      #wsUrl,
      #messageInput {
        flex: 1;
        padding: 8px;
      }
      button {
        padding: 8px 12px;
      }
      #log {
        width: 100%;
        height: 420px;
        padding: 10px;
        box-sizing: border-box;
      }
      .status {
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Agent WebSocket Test Client</h1>

    <div class="status">
      Status: <strong id="status">Disconnected</strong>
    </div>

    <div class="row">
      <input id="wsUrl" value="ws://localhost:8000/ws" />
      <button id="connectBtn">Connect</button>
      <button id="disconnectBtn">Disconnect</button>
    </div>

    <div class="row">
      <input id="messageInput" placeholder="Type a message..." />
      <button id="sendBtn">Send Chat</button>
      <button id="pingBtn">Ping</button>
    </div>

    <textarea id="log" readonly></textarea>

    <script>
      let ws = null;
      const statusEl = document.getElementById("status");
      const wsUrlEl = document.getElementById("wsUrl");
      const messageInputEl = document.getElementById("messageInput");
      const logEl = document.getElementById("log");

      function now() {
        return new Date().toLocaleTimeString();
      }

      function log(message) {
        logEl.value += `[${now()}] ${message}\n`;
        logEl.scrollTop = logEl.scrollHeight;
      }

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function connect() {
        if (ws && ws.readyState === WebSocket.OPEN) {
          log("Already connected.");
          return;
        }

        const url = wsUrlEl.value.trim() || "ws://localhost:8000/ws";
        ws = new WebSocket(url);
        setStatus("Connecting...");
        log(`Connecting to ${url}`);

        ws.onopen = () => {
          setStatus("Connected");
          log("Connected.");
        };

        ws.onmessage = (event) => {
          log(`RECV: ${event.data}`);
        };

        ws.onerror = () => {
          log("WebSocket error.");
        };

        ws.onclose = () => {
          setStatus("Disconnected");
          log("Disconnected.");
        };
      }

      function disconnect() {
        if (!ws) {
          return;
        }
        ws.close();
      }

      function sendJson(payload) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
          log("Not connected.");
          return;
        }
        const text = JSON.stringify(payload);
        ws.send(text);
        log(`SEND: ${text}`);
      }

      function sendChat() {
        const message = messageInputEl.value.trim();
        if (!message) {
          return;
        }
        sendJson({ type: "chat", payload: { message } });
        messageInputEl.value = "";
      }

      function sendPing() {
        sendJson({ type: "ping", payload: { timestamp: Date.now() } });
      }

      document.getElementById("connectBtn").addEventListener("click", connect);
      document.getElementById("disconnectBtn").addEventListener("click", disconnect);
      document.getElementById("sendBtn").addEventListener("click", sendChat);
      document.getElementById("pingBtn").addEventListener("click", sendPing);
      messageInputEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          sendChat();
        }
      });
    </script>
  </body>
</html>
